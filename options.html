<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab Group Manager - Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="options-container">
      <header class="options-header">
        <h1>Tab Group Manager Settings</h1>
      </header>

      <section class="settings-section">
        <h2>General Settings</h2>

        <div class="setting-row">
          <label for="enable-auto-group">
            <span class="setting-label">Enable Auto-Grouping</span>
            <span class="setting-desc"
              >Automatically group tabs when they are created or URL
              changes</span
            >
          </label>
          <label class="toggle-switch">
            <input type="checkbox" id="enable-auto-group" />
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="setting-row">
          <label for="group-tab-num">
            <span class="setting-label">Minimum Tabs to Group</span>
            <span class="setting-desc"
              >Minimum number of tabs with same domain before grouping</span
            >
          </label>
          <input type="number" id="group-tab-num" min="1" max="50" value="1" />
        </div>

        <div class="setting-row">
          <label for="inherit-parent-group">
            <span class="setting-label">New Tab Inherits Parent Group</span>
            <span class="setting-desc"
              >When clicking a link in a grouped tab, new tab joins parent's
              group</span
            >
          </label>
          <label class="toggle-switch">
            <input type="checkbox" id="inherit-parent-group" />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </section>

      <section class="settings-section">
        <h2>Grouping Strategy</h2>

        <div class="strategy-hint">
          <span class="hint-text"
            >Drag to reorder priority (top = highest). Unchecked strategies are
            disabled.</span
          >
        </div>

        <div class="strategy-list" id="strategy-list">
          <div class="strategy-item" draggable="true" data-strategy="1">
            <span class="drag-handle">⋮⋮</span>
            <input
              type="checkbox"
              class="strategy-checkbox"
              value="1"
              id="strategy-1"
            />
            <label for="strategy-1" class="strategy-content">
              <span class="strategy-label">Domain</span>
              <span class="strategy-desc"
                >Group by full domain (e.g., github.com, gitlab.com)</span
              >
            </label>
          </div>

          <div class="strategy-item" draggable="true" data-strategy="2">
            <span class="drag-handle">⋮⋮</span>
            <input
              type="checkbox"
              class="strategy-checkbox"
              value="2"
              id="strategy-2"
            />
            <label for="strategy-2" class="strategy-content">
              <span class="strategy-label">Secondary Domain</span>
              <span class="strategy-desc"
                >Group by second-level domain (e.g., github.com from
                user.github.com)</span
              >
            </label>
          </div>

          <div class="strategy-item" draggable="true" data-strategy="3">
            <span class="drag-handle">⋮⋮</span>
            <input
              type="checkbox"
              class="strategy-checkbox"
              value="3"
              id="strategy-3"
            />
            <label for="strategy-3" class="strategy-content">
              <span class="strategy-label">Custom Rules</span>
              <span class="strategy-desc"
                >Define your own grouping rules with patterns</span
              >
            </label>
          </div>
        </div>
      </section>
      <div
        id="sec-domain-options"
        class="settings-subsection"
        style="display: none"
      >
        <div class="setting-row">
          <label for="sec-domain-ignore-tld">
            <span class="setting-label"
              >Group by root name only (ignore TLD)</span
            >
            <span class="setting-desc"
              >e.g. github.com and github.io will be grouped as "github"</span
            >
          </label>
          <label class="toggle-switch">
            <input type="checkbox" id="sec-domain-ignore-tld" />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <section
        class="settings-section"
        id="custom-rules-section"
        style="display: none"
      >
        <h2>Custom Rules</h2>

        <div class="setting-row">
          <label for="fallback-strategy">
            <span class="setting-label">Fallback Strategy</span>
            <span class="setting-desc">What to do when no rule matches</span>
          </label>
          <select id="fallback-strategy">
            <option value="none">Don't Group</option>
            <option value="domain">Group by Domain</option>
            <option value="secDomain">Group by Secondary Domain</option>
          </select>
        </div>

        <div class="rules-header">
          <h3>Rules</h3>
          <div class="rules-actions">
            <button type="button" id="add-rule-btn" class="btn btn-secondary">
              Add Rule
            </button>
            <button
              type="button"
              id="import-rules-btn"
              class="btn btn-secondary"
            >
              Import
            </button>
            <button
              type="button"
              id="export-rules-btn"
              class="btn btn-secondary"
            >
              Export
            </button>
          </div>
        </div>

        <div id="rules-container"></div>

        <input
          type="file"
          id="import-file-input"
          accept=".json"
          style="display: none"
        />
      </section>

      <section class="settings-section">
        <h2>Actions</h2>
        <div class="actions-row">
          <button type="button" id="save-btn" class="btn btn-primary">
            Save Settings
          </button>
          <button type="button" id="reset-btn" class="btn btn-secondary">
            Reset to Defaults
          </button>
        </div>
      </section>

      <div id="status-message" class="status-message"></div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
