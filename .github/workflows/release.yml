name: Build Chrome Extension

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Get tag annotation
        id: tag_msg
        run: |
          TAG_BODY=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          echo 'TAG_BODY<<EOF' >> $GITHUB_OUTPUT
          echo "$TAG_BODY" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Build and Package Extension
        run: |
          zip -r tab-group-manager-v${{ steps.version.outputs.VERSION }}.zip \
            _locales/ \
            background/ \
            core/ \
            domain/ \
            images/ \
            manifest.json \
            options.css \
            options.html \
            options.js \
            popup/ \

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ${{ steps.tag_msg.outputs.TAG_BODY }}

            ---
            **Version**: ${{ steps.version.outputs.VERSION }}
          files: |
            tab-group-manager-v${{ steps.version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
